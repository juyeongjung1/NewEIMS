<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>検索結果</title>
</head>
<body>
    <main layout:fragment="content">
        <h2 class="mb-4">検索結果</h2>


        <!-- 【課題6.1追加】 検索結果が存在する場合のみテーブルを表示 -->
        <div class="table-responsive" th:if="${!#lists.isEmpty(books)}">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>書籍名</th>
                        <th>著者名</th>
                        <th>価格</th>
                        <th>ジャンル名</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="book : ${books}">
                        <td th:text="${book.id}"></td>
                        <td>
                            <a th:href="@{/book/detail/} + ${book.id}" th:text="${book.title}" class="fw-bold text-decoration-none"></a>
                        </td>
                        <td th:text="${book.author}"></td>
                        <td th:text="${book.price} + ' 円'"></td>
                        <td th:text="${book.genre != null ? book.genre.name : '不明'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 【課題6.1追加】 検索結果が0件の場合のメッセージ表示 -->
        <!-- alert-warning: 黄色の警告通知スタイル -->
        <div th:if="${#lists.isEmpty(books)}" class="alert alert-warning">
            該当する書籍は見つかりませんでした。
        </div>

        <div class="mt-4">
            <a th:href="@{/book/index}" class="btn btn-secondary">メニューに戻る</a>
        </div>
    </main>
</body>
</html>
