<!DOCTYPE html>
<!--
  削除確認ページ。
  表示内容を確認して削除ボタンを押すとレコードが削除されます。
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>社員情報登録確認</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">社員情報削除確認</h1>
        <p>以下の社員情報を削除しますか？</p>
        <!-- 削除処理を実行するフォーム -->
        <form th:action="@{/deleteEmployee}" th:object="${employee}" method="post" class="mt-3">
            <table class="table table-bordered">
                <tr>
                    <td>社員番号</td>
                    <td><p th:text="*{empno}"></p></td>
                </tr>
                <tr>
                    <td>氏</td>
                    <td><p th:text="*{lname}"></p></td>
                </tr>
                <tr>
                    <td>名</td>
                    <td><p th:text="*{fname}"></p></td>
                </tr>
                <tr>
                    <td>氏（カナ）</td>
                    <td><p th:text="*{lkana}"></p></td>
                </tr>
                <tr>
                    <td>名（カナ）</td>
                    <td><p th:text="*{fkana}"></p></td>
                </tr>
                <tr>
                    <td>性別</td>
                    <td><p th:text="*{gender == 1 ? '男性' : gender == 2 ? '女性' : '未選択'}"></p></td>
                </tr>
                <tr>
                    <td>部署名</td>
                    <td>
                        <p th:text="*{deptno == 100 ? '人事部' :
                                      deptno == 200 ? '経理部' :
                                      deptno == 300 ? '営業部' :
                                      deptno == 400 ? '企画部' :
                                      deptno == 500 ? '開発部' : 
                                      deptno == 600 ? '総務部' : '未選択'}"></p>
                    </td>
                </tr>
            </table>
            <div class="form-group row">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-danger">削除確定</button>
                </div>
            </div>
            <!-- hidden に保持しておくことでボタン一つで送信できる -->
            <input type="hidden" th:field="*{empno}" />
            <input type="hidden" th:field="*{lname}" />
            <input type="hidden" th:field="*{fname}" />
            <input type="hidden" th:field="*{lkana}" />
            <input type="hidden" th:field="*{fkana}" />
            <input type="hidden" th:field="*{gender}" />
            <input type="hidden" th:field="*{deptno}" />

        </form>
        <form th:action="@{/search}" method="get" class="mt-2">
            <div class="form-group row">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-secondary">取消</button>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
