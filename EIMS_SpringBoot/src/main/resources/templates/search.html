<!DOCTYPE html>
<!--
  社員情報を検索する画面。
  社員番号、氏名、部署名の3種類で検索できます。
-->
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap CSSの読み込み -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <title>検索条件入力</title>
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">検索条件入力</h1>

        <div class="mb-3">
            <h4>社員番号検索</h4>
            <!-- 社員番号を直接指定して検索 -->
            <form th:action="@{/selectByEmpNo}" method="get" class="form-inline">
                <div class="form-group mr-2">
                    <!-- 数値のみ入力可能 -->
                    <input type="number" name="empno" class="form-control" placeholder="社員番号">
                </div>
                <button type="submit" class="btn btn-primary">検索</button>
            </form>
        </div>

        <div class="mb-4">
            <h4>氏名で検索</h4>
            <!-- 姓・名のどちらかを部分一致で検索 -->
            <form th:action="@{/selectByEmpName}" method="get" class="form-inline">
                <div class="form-group mr-2">
                    <input type="text" name="keyword" class="form-control" placeholder="氏名を入力（部分一致）">
                </div>
                <button type="submit" class="btn btn-primary">検索</button>
            </form>
        </div>

        <div class="mb-4">
            <h4>部署名検索</h4>
            <!-- 部署プルダウンから選択して検索 -->
            <form th:action="@{/selectByDeptNo}" method="get" class="form-inline">
                <div class="form-group mr-2">
                    <select name="deptno" class="form-control">
                        <!-- 部署一覧はコントローラで取得してモデルに登録 -->
                        <option th:each="dept : ${departments}"
                                th:value="${dept.deptno}"
                                th:text="${dept.deptname}">
                        </option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">検索</button>
            </form>
        </div>

        <div class="button-group mb-3">
            <a th:href="@{/}" class="btn btn-secondary">トップページに戻る</a>
        </div>
    </div>

    <!-- Bootstrap JSと依存関係の読み込み -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>

</html>
