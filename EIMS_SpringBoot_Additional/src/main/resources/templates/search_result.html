<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>検索結果一覧</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="fw-bold text-primary mb-4"><i class="bi bi-list-check me-2"></i>検索結果一覧</h2>

        <div th:if="${employees.?[deleteFlg == 0].empty}" class="alert alert-info shadow-sm">
            <i class="bi bi-info-circle me-2"></i>該当する在籍社員は存在しませんでした。
        </div>

        <div th:if="${!employees.?[deleteFlg == 0].empty}" class="card shadow-sm border-0 bg-white">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">社員番号</th>
                            <th>氏名</th>
                            <th>部署</th>
                            <th>権限</th>
                            <th>状態</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="employee : ${employees}" th:if="${employee.deleteFlg == 0}">
                            <td class="ps-4 fw-bold" th:text="${employee.empNo}">10001</td>
                            <td>
                                <a th:href="@{/detail/{id}(id=${employee.empNo})}" 
                                   th:text="${employee.lastName + ' ' + employee.firstName + ' (' + employee.lastKana + ' ' + employee.firstKana + ')'}"
                                   class="text-decoration-none fw-bold">氏名 (カナ)</a>
                            </td>
                            <td th:text="${employee.department.deptName}">部署名</td>
                            <td>
                                <span th:if="${employee.role == 1}" class="badge bg-primary">管理者</span>
                                <span th:if="${employee.role == 0}" class="badge bg-secondary">一般</span>
                            </td>
                            <td>
                                <span th:if="${employee.deleteFlg == 0}" class="badge bg-success">在籍</span>
                                <span th:if="${employee.deleteFlg == 1}" class="badge bg-danger">退職</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <a th:href="@{/search}" class="btn btn-outline-secondary">検索画面に戻る</a>
            <a th:href="@{/index}" class="btn btn-outline-secondary">トップに戻る</a>
        </div>
    </div>
</body>
</html>
