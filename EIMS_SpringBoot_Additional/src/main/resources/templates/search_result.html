<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>検索結果</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card p-4 shadow-sm border-0 bg-white">
            <h2 class="fw-bold text-primary mb-4"><i class="bi bi-list-ul me-2"></i>検索結果</h2>

            <div th:if="${#lists.isEmpty(employees)}" class="alert alert-warning">
                対象の社員が見つかりませんでした。
            </div>

            <div th:if="${!#lists.isEmpty(employees)}" class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>写真</th>
                            <th>社員番号</th>
                            <th>氏名</th>
                            <th>部署</th>
                            <th th:if="${session.loginEmployee != null and session.loginEmployee.role == 1}">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="emp : ${employees}">
                            <td>
                                <img src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?w=100&h=120&fit=crop" 
                                     class="photo-thumbnail" alt="顔写真">
                            </td>
                            <td th:text="${emp.empNo}" class="fw-bold">10001</td>
                            <td>
                                <a th:href="@{/detail/{empno}(empno=${emp.empNo})}" 
                                   th:text="${emp.lastName + ' ' + emp.firstName}" class="text-decoration-none fw-bold">氏名</a>
                                <br>
                                <small class="text-secondary" th:text="${emp.lastKana + ' ' + emp.firstKana}">シメイ</small>
                            </td>
                            <td th:text="${emp.department.deptName}">部署名</td>
                            <td th:if="${session.loginEmployee != null and session.loginEmployee.role == 1}">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/change/{empno}(empno=${emp.empNo})}" class="btn btn-outline-primary">変更</a>
                                    <a th:href="@{/deleteConfirm/{empno}(empno=${emp.empNo})}" class="btn btn-outline-danger">退職</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4 pt-3 border-top d-flex justify-content-between align-items-center">
                <a th:href="@{/search}" class="btn btn-outline-secondary">検索画面へ戻る</a>
                <a th:if="${session.loginEmployee != null and session.loginEmployee.role == 1}" 
                   th:href="@{/employeeList}" class="btn btn-warning">全社員一覧を表示</a>
            </div>
        </div>
    </div>
</body>
</html>
