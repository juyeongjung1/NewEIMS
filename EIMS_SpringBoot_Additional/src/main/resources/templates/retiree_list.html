<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>退職者管理</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card p-4 shadow-sm border-0 bg-white">
            <h2 class="fw-bold text-danger mb-4"><i class="bi bi-person-x me-2"></i>退職者管理</h2>

            <div th:if="${retirees.?[deleteFlg == 1].empty}" class="alert alert-info">
                現在、退職済みの社員はいません。
            </div>

            <div th:if="${!retirees.?[deleteFlg == 1].empty}" class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>社員番号</th>
                            <th>氏名</th>
                            <th>部署</th>
                            <th class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="emp : ${retirees}" th:if="${emp.deleteFlg == 1}">
                            <td th:text="${emp.empNo}">10001</td>
                            <td>
                                <span th:text="${emp.lastName + ' ' + emp.firstName}" class="fw-bold">氏名</span>
                                <br>
                                <small class="text-secondary" th:text="${emp.lastKana + ' ' + emp.firstKana}">シメイ</small>
                            </td>
                            <td th:text="${emp.department.deptName}">部署名</td>
                            <td class="text-center">
                                <div class="d-flex gap-2 justify-content-center">
                                    <!-- 復元フォーム (JSなし) -->
                                    <form th:action="@{/restore/{empNo}(empNo=${emp.empNo})}" method="post">
                                        <button type="submit" class="btn btn-sm btn-success">復元</button>
                                    </form>
                                    
                                    <!-- 完全削除フォーム (JSなし) -->
                                    <form th:action="@{/physicalDelete/{empNo}(empNo=${emp.empNo})}" method="post">
                                        <button type="submit" class="btn btn-sm btn-danger">完全削除</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4 pt-3 border-top">
                <a th:href="@{/index}" class="btn btn-outline-secondary">戻る</a>
            </div>
        </div>
    </div>
</body>
</html>
