<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>社員詳細</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card p-4 shadow-sm border-0 bg-white">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-primary m-0"><i class="bi bi-person-badge me-2"></i>社員詳細</h2>
                <div class="badge bg-primary fs-6 px-3 py-2" 
                     th:text="${employee.role == 1 ? '管理者' : '一般ユーザー'}">権限</div>
            </div>

            <div class="row">
                <div class="col-md-3 text-center mb-4">
                    <img src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?w=200&h=250&fit=crop" 
                         class="img-fluid rounded shadow-sm border" alt="顔写真">
                </div>
                <div class="col-md-9">
                    <table class="table table-bordered">
                        <tr>
                            <th class="table-light w-25">社員番号</th>
                            <td th:text="${employee.empNo}" class="fw-bold">10001</td>
                        </tr>
                        <tr>
                            <th class="table-light">氏名 (漢字)</th>
                            <td th:text="${employee.lastName + ' ' + employee.firstName}">氏名</td>
                        </tr>
                        <tr>
                            <th class="table-light">氏名 (カナ)</th>
                            <td th:text="${employee.lastKana + ' ' + employee.firstKana}">シメイ</td>
                        </tr>
                        <tr>
                            <th class="table-light">性別</th>
                            <td th:text="${employee.gender == 1 ? '男性' : '女性'}">性別</td>
                        </tr>
                        <tr>
                            <th class="table-light">部署</th>
                            <td th:text="${employee.department.deptName}">部署名</td>
                        </tr>
                        <tr>
                            <th class="table-light">退職済み</th>
                            <td th:text="${employee.deleteFlg == 1 ? 'はい' : 'いいえ'}">いいえ</td>
                        </tr>
                    </table>
                </div>
            </div>

            <div class="mt-4 pt-3 border-top d-flex gap-2 justify-content-center">
                <a th:href="@{/search}" class="btn btn-outline-secondary">戻る</a>
                
                <div th:if="${session.loginEmployee != null and (session.loginEmployee.role == 1 or session.loginEmployee.empNo == employee.empNo)}">
                    <a th:href="@{/change/{empno}(empno=${employee.empNo})}" class="btn btn-primary">変更</a>
                </div>
                
                <div th:if="${session.loginEmployee != null and session.loginEmployee.role == 1 and session.loginEmployee.empNo != employee.empNo and employee.deleteFlg == 0}">
                    <a th:href="@{/deleteConfirm/{empno}(empno=${employee.empNo})}" class="btn btn-danger">退職処理</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
