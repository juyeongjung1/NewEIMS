<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - EIMS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow-sm border-0" style="width: 100%; max-width: 400px;">
        <h2 class="text-center fw-bold text-primary mb-4">EIMS ログイン</h2>
        
        <div th:if="${loginError}" class="alert alert-danger py-2 small">
            社員番号またはパスワードが正しくありません。
        </div>

        <form th:action="@{/login}" th:object="${loginForm}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">社員番号</label>
                <input type="number" th:field="*{empNo}" class="form-control" placeholder="10001">
                <div th:errors="*{empNo}" class="text-danger mt-1"></div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">パスワード</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="password">
                <div th:errors="*{password}" class="text-danger mt-1"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">ログイン</button>
        </form>

        <div class="mt-4 text-center">
            <a th:href="@{/input}" class="text-decoration-none small text-secondary">新規会員登録（社員登録画面）へ</a>
        </div>
    </div>
</body>
</html>
