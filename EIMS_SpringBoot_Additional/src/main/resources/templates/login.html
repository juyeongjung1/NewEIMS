<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - EIMS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="text-center fw-bold text-primary mb-4">EIMS ログイン</h2>
        
        <div th:if="${loginError}" class="alert alert-danger py-2 small">
            社員番号またはパスワードが正しくありません。
        </div>

        <form th:action="@{/login}" th:object="${loginForm}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">社員番号</label>
                <input type="number" th:field="*{empNo}" class="form-control" th:errorclass="is-invalid" placeholder="10001">
                <div class="invalid-feedback" th:errors="*{empNo}"></div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">パスワード</label>
                <input type="password" th:field="*{password}" class="form-control" th:errorclass="is-invalid" placeholder="password">
                <div class="invalid-feedback" th:errors="*{password}"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">ログイン</button>
        </form>

        <div class="mt-4 text-center">
            <a th:href="@{/input}" class="text-decoration-none small text-secondary">新規会員登録（社員登録画面）へ</a>
        </div>
    </div>
</body>
</html>
