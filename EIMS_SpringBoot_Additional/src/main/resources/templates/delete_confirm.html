<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>削除確認</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card p-4 mx-auto border-danger shadow" style="max-width: 800px;">
            <h2 class="text-danger mb-4 fw-bold"><i class="bi bi-exclamation-triangle me-2"></i>社員削除の確認</h2>
            <div class="alert alert-warning">
                この社員を「退職」扱いに変更します。よろしいですか？<br>
                <small>※データ自体は「退職者一覧」から参照・復元が可能です。</small>
            </div>

            <table class="table table-bordered mb-4">
                <tbody>
                    <tr><th class="bg-light w-25">社員番号</th><td th:text="${employee.empNo}"></td></tr>
                    <tr><th class="bg-light">氏名</th><td th:text="${employee.lastName + ' ' + employee.firstName}"></td></tr>
                    <tr><th class="bg-light">所属部署</th><td th:text="${employee.department.deptName}"></td></tr>
                </tbody>
            </table>

            <form th:action="@{/deleteEmployee}" method="post">
                <input type="hidden" name="empNo" th:value="${employee.empNo}">
                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn btn-danger px-5">削除実行（退職にする）</button>
                    <a th:href="@{/detail/{id}(id=${employee.empNo})}" class="btn btn-outline-secondary">キャンセル</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
