<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>登録完了</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card p-5 text-center shadow-sm border-0 bg-white">
            <div class="mb-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
            </div>
            <h2 class="fw-bold text-success mb-3">社員情報の登録が完了しました</h2>
            <p class="text-secondary mb-4">社員番号 <strong th:text="${employee.empNo}"></strong> で登録されました。</p>
            
            <div class="d-flex gap-2 justify-content-center mt-3">
                <a th:href="@{/input}" class="btn btn-success px-4">続けて登録する</a>
                <a th:href="@{/index}" class="btn btn-outline-secondary px-4">トップに戻る</a>
            </div>
        </div>
    </div>
</body>
</html>
