<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>トップページ</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card p-5 shadow-sm border-0 bg-white mb-4">
            <h1 class="display-5 fw-bold text-primary mb-3">EIMS 社員情報管理システム</h1>
            <p class="lead text-secondary">このシステムでは、社員情報の検索、登録、更新、および削除を行うことができます。</p>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card h-100 p-4 shadow-sm hover-shadow transition">
                    <div class="d-flex align-items-center mb-3">
                        <div class="bg-primary bg-opacity-10 p-3 rounded-circle me-3">
                            <i class="bi bi-search fs-3 text-primary"></i>
                        </div>
                        <h5 class="fw-bold m-0">社員検索</h5>
                    </div>
                    <p class="text-secondary small mb-4">番号、氏名、部署から社員を検索します。</p>
                    <a th:href="@{/search}" class="btn btn-primary mt-auto">検索画面へ</a>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100 p-4 shadow-sm hover-shadow transition">
                    <div class="d-flex align-items-center mb-3">
                        <div class="bg-success bg-opacity-10 p-3 rounded-circle me-3">
                            <i class="bi bi-person-plus fs-3 text-success"></i>
                        </div>
                        <h5 class="fw-bold m-0">新規登録</h5>
                    </div>
                    <p class="text-secondary small mb-4">新しい社員の情報をシステムに登録します。</p>
                    <a th:href="@{/input}" class="btn btn-success mt-auto">登録画面へ</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
