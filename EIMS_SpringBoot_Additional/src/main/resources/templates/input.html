<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>社員登録</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card p-4 shadow-sm border-0 bg-white">
            <h2 class="fw-bold text-primary mb-4"><i class="bi bi-person-plus me-2"></i>社員情報登録</h2>

            <form th:action="@{/inputConfirm}" th:object="${employeeForm}" method="post">
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">氏 (漢字)</label>
                        <input type="text" th:field="*{lastName}" class="form-control" th:errorclass="is-invalid" placeholder="例: 山田">
                        <div class="invalid-feedback" th:errors="*{lastName}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">名 (漢字)</label>
                        <input type="text" th:field="*{firstName}" class="form-control" th:errorclass="is-invalid" placeholder="例: 太郎">
                        <div class="invalid-feedback" th:errors="*{firstName}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">氏 (カナ)</label>
                        <input type="text" th:field="*{lastKana}" class="form-control" th:errorclass="is-invalid" placeholder="例: ヤマダ">
                        <div class="invalid-feedback" th:errors="*{lastKana}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">名 (カナ)</label>
                        <input type="text" th:field="*{firstKana}" class="form-control" th:errorclass="is-invalid" placeholder="例: タロウ">
                        <div class="invalid-feedback" th:errors="*{firstKana}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">パスワード</label>
                        <input type="password" th:field="*{password}" class="form-control" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{password}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">性別</label>
                        <div class="pt-2">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" th:field="*{gender}" value="1" id="male">
                                <label class="form-check-label" for="male">男性</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" th:field="*{gender}" value="2" id="female">
                                <label class="form-check-label" for="female">女性</label>
                            </div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">部署</label>
                        <select th:field="*{deptNo}" class="form-select" th:errorclass="is-invalid">
                            <option value="">選択してください</option>
                            <option th:each="dept : ${departments}" th:value="${dept.deptNo}" th:text="${dept.deptName}">部署</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{deptNo}"></div>
                    </div>
                    <div class="col-md-6" th:if="${session.loginEmployee != null and session.loginEmployee.role == 1}">
                        <label class="form-label fw-bold text-warning">権限設定 (管理者のみ可)</label>
                        <select th:field="*{role}" class="form-select">
                            <option value="0">一般ユーザー</option>
                            <option value="1">管理者</option>
                        </select>
                    </div>
                </div>

                <div class="mt-4 pt-3 border-top d-flex justify-content-center gap-2">
                    <a th:href="@{/index}" class="btn btn-outline-secondary">戻る</a>
                    <button type="submit" class="btn btn-primary">確認画面へ</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
