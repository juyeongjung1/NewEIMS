<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>社員登録</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card p-4 shadow-sm border-0 bg-white">
            <h2 class="fw-bold text-primary mb-4"><i class="bi bi-person-plus me-2"></i>社員登録</h2>

            <form th:action="@{/inputConfirm}" th:object="${employeeForm}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">氏</label>
                        <input type="text" th:field="*{lastName}" class="form-control" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{lastName}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">名</label>
                        <input type="text" th:field="*{firstName}" class="form-control" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{firstName}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">氏（カナ）</label>
                        <input type="text" th:field="*{lastKana}" class="form-control" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{lastKana}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">名（カナ）</label>
                        <input type="text" th:field="*{firstKana}" class="form-control" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{firstKana}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">パスワード</label>
                        <input type="password" th:field="*{password}" class="form-control" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{password}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">部署</label>
                        <select th:field="*{deptNo}" class="form-select" th:errorclass="is-invalid">
                            <option value="">部署を選択してください</option>
                            <option th:each="dept : ${departments}" th:value="${dept.deptNo}" th:text="${dept.deptName}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{deptNo}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold d-block">性別</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" th:field="*{gender}" value="1" id="gender1">
                            <label class="form-check-label" for="gender1">男性</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" th:field="*{gender}" value="2" id="gender2">
                            <label class="form-check-label" for="gender2">女性</label>
                        </div>
                        <div class="text-danger small" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold d-block">権限（オプション機能）</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" th:field="*{role}" value="0" id="role0">
                            <label class="form-check-label" for="role0">一般</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" th:field="*{role}" value="1" id="role1">
                            <label class="form-check-label" for="role1">管理者</label>
                        </div>
                    </div>
                </div>

                <div class="mt-4 pt-3 border-top d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn btn-primary px-5">登録確認</button>
                    <a th:href="@{/index}" class="btn btn-outline-secondary">戻る</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
