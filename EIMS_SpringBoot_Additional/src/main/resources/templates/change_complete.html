<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>変更完了</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card p-5 text-center shadow-sm border-0 bg-white">
            <div class="mb-4">
                <i class="bi bi-check-circle-fill text-primary" style="font-size: 4rem;"></i>
            </div>
            <h2 class="fw-bold text-primary mb-3">社員情報の変更が完了しました</h2>
            <p class="text-secondary mb-4">社員番号 <strong th:text="${employee.empNo}"></strong> の情報を更新しました。</p>
            
            <div class="d-flex gap-2 justify-content-center mt-3">
                <a th:href="@{/index}" class="btn btn-primary px-4">トップに戻る</a>
                <a th:href="@{/search}" class="btn btn-outline-secondary px-4">検索画面に戻る</a>
            </div>
        </div>
    </div>
</body>
</html>
