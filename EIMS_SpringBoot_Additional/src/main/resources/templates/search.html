<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>社員検索</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="fw-bold text-primary mb-4"><i class="bi bi-search me-2"></i>社員検索</h2>

        <div class="row g-4">
            <!-- 社員番号で検索 -->
            <div class="col-md-4">
                <div class="card p-4 h-100 shadow-sm">
                    <h5 class="fw-bold mb-3 border-bottom pb-2">社員番号で検索</h5>
                    <form th:action="@{/selectByEmpNo}" method="get">
                        <div class="mb-3">
                            <input type="number" name="empNo" class="form-control" placeholder="例: 10001" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">検索</button>
                    </form>
                </div>
            </div>

            <!-- 名前で検索 -->
            <div class="col-md-4">
                <div class="card p-4 h-100 shadow-sm">
                    <h5 class="fw-bold mb-3 border-bottom pb-2">名前で検索</h5>
                    <form th:action="@{/selectByEmpName}" method="get">
                        <div class="mb-3">
                            <input type="text" name="keyword" class="form-control" placeholder="名字または名前" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">検索</button>
                    </form>
                </div>
            </div>

            <!-- 部署で検索 -->
            <div class="col-md-4">
                <div class="card p-4 h-100 shadow-sm">
                    <h5 class="fw-bold mb-3 border-bottom pb-2">部署で検索</h5>
                    <form th:action="@{/selectByDeptNo}" method="get">
                        <div class="mb-3">
                            <select name="deptNo" class="form-select" required>
                                <option value="" disabled selected>部署を選択してください</option>
                                <option th:each="dept : ${departments}" 
                                        th:value="${dept.deptNo}" 
                                        th:text="${dept.deptName}">部署名</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">検索</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a th:href="@{/index}" class="btn btn-outline-secondary">戻る</a>
        </div>
    </div>
</body>
</html>
