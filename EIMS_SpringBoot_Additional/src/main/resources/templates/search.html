<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>社員検索</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card p-4 shadow-sm border-0 bg-white">
            <h2 class="fw-bold text-primary mb-4"><i class="bi bi-search me-2"></i>社員検索</h2>
            
            <div class="row g-4">
                <!-- 社員番号検索 -->
                <div class="col-md-6">
                    <div class="card p-3 border h-100">
                        <h5 class="fw-bold mb-3">社員番号で検索</h5>
                        <form th:action="@{/selectByEmpNo}" method="get">
                            <div class="mb-3">
                                <input type="number" name="empNo" class="form-control" placeholder="例: 10001" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">検索</button>
                        </form>
                    </div>
                </div>
                
                <!-- 氏名検索 -->
                <div class="col-md-6">
                    <div class="card p-3 border h-100">
                        <h5 class="fw-bold mb-3">氏名で検索</h5>
                        <form th:action="@{/selectByName}" method="get">
                            <div class="mb-3">
                                <input type="text" name="name" class="form-control" placeholder="例: 山田" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">検索</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="mt-4 pt-3 border-top text-center">
                <a th:href="@{/index}" class="btn btn-outline-secondary">戻る</a>
            </div>
        </div>
    </div>
</body>
</html>
