<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIMS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            background-color: #212529;
            padding-top: 60px;
            transition: all 0.3s;
        }
        .sidebar .nav-link {
            color: #adb5bd;
            padding: 10px 20px;
            font-weight: 500;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff;
            background-color: #343a40;
        }
        .main-content {
            margin-left: 250px;
            padding: 80px 20px 20px;
            min-height: 100vh;
        }
        .navbar {
            margin-left: 250px;
            z-index: 101;
            box-shadow: 0 2px 4px rgba(0,0,0,.08);
        }
        @media (max-width: 992px) {
            .sidebar {
                margin-left: -250px;
            }
            .sidebar.show {
                margin-left: 0;
            }
            .main-content, .navbar {
                margin-left: 0;
            }
        }
        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            border-radius: 0.75rem;
        }
        .btn-primary {
            background-color: #0d6efd;
            border-radius: 0.5rem;
            padding: 0.5rem 1.25rem;
            font-weight: 600;
        }
        .photo-thumbnail {
            width: 60px;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="position-sticky">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/index}">
                        <i class="bi bi-house-door me-2"></i> トップページ
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/search}">
                        <i class="bi bi-search me-2"></i> 社員情報検索
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/input}">
                        <i class="bi bi-person-plus me-2"></i> 社員情報登録
                    </a>
                </li>
                <!-- 管理者のみ表示されるリンク -->
                <li class="nav-item" th:if="${session.loginEmployee != null and session.loginEmployee.role == 1}">
                    <a class="nav-link text-warning" th:href="@{/employeeList}">
                        <i class="bi bi-people me-2"></i> 全社員一覧
                    </a>
                </li>
                <li class="nav-item" th:if="${session.loginEmployee != null and session.loginEmployee.role == 1}">
                    <a class="nav-link text-danger" th:href="@{/retireeList}">
                        <i class="bi bi-person-x me-2"></i> 退職者管理
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-white bg-white fixed-top">
        <div class="container-fluid">
            <button class="btn d-lg-none" type="button" onclick="document.getElementById('sidebar').classList.toggle('show')">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand fw-bold text-primary" th:href="@{/index}">EIMS</a>
            
            <div class="ms-auto d-flex align-items-center">
                <div th:if="${session.loginEmployee != null}" class="d-flex align-items-center">
                    <span class="text-secondary me-3">
                        ようこそ、<a th:href="@{/detail/{empno}(empno=${session.loginEmployee.empNo})}" 
                                   class="text-decoration-none fw-bold" 
                                   th:text="${session.loginEmployee.lastName + ' ' + session.loginEmployee.firstName}">氏名</a> さん
                    </span>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-danger btn-sm">ログアウト</button>
                    </form>
                </div>
                <div th:if="${session.loginEmployee == null}">
                    <a th:href="@{/login}" class="btn btn-primary btn-sm">ログイン</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-fluid">
            <div layout:fragment="content"></div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</body>
</html>
