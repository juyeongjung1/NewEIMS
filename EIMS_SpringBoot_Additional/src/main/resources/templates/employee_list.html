<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>全社員一覧</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card p-4 shadow-sm border-0 bg-white">
            <h2 class="fw-bold text-primary mb-4"><i class="bi bi-people me-2"></i>全社員一覧</h2>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>社員番号</th>
                            <th>氏名</th>
                            <th>部署</th>
                            <th>権限</th>
                            <th>状態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="emp : ${employees}">
                            <td th:text="${emp.empNo}">10001</td>
                            <td>
                                <a th:href="@{/detail/{empno}(empno=${emp.empNo})}" 
                                   th:text="${emp.lastName + ' ' + emp.firstName}" class="text-decoration-none fw-bold">氏名</a>
                            </td>
                            <td th:text="${emp.department.deptName}">部署名</td>
                            <td>
                                <span th:class="${emp.role == 1 ? 'badge bg-warning text-dark' : 'badge bg-light text-dark'}"
                                      th:text="${emp.role == 1 ? '管理者' : '一般'}">一般</span>
                            </td>
                            <td>
                                <span th:class="${emp.deleteFlg == 1 ? 'text-danger' : 'text-success'}"
                                      th:text="${emp.deleteFlg == 1 ? '退職' : '在籍'}">在籍</span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/change/{empno}(empno=${emp.empNo})}" class="btn btn-outline-primary">変更</a>
                                    <a th:if="${emp.deleteFlg == 0 and session.loginEmployee.empNo != emp.empNo}" 
                                       th:href="@{/deleteConfirm/{empno}(empno=${emp.empNo})}" class="btn btn-outline-danger">退職</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4 pt-3 border-top">
                <a th:href="@{/index}" class="btn btn-outline-secondary">戻る</a>
            </div>
        </div>
    </div>
</body>
</html>
