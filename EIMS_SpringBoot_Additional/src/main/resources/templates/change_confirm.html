<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <title>変更確認</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card p-4 shadow-sm border-0 bg-white">
            <h2 class="fw-bold text-primary mb-4"><i class="bi bi-check2-circle me-2"></i>変更内容の確認</h2>
            
            <table class="table table-bordered mb-4">
                <tbody>
                    <tr><th class="bg-light w-25">社員番号</th><td th:text="${employeeForm.empNo}"></td></tr>
                    <tr><th class="bg-light">氏名</th><td th:text="${employeeForm.lastName + ' ' + employeeForm.firstName}"></td></tr>
                    <tr><th class="bg-light">氏名（カナ）</th><td th:text="${employeeForm.lastKana + ' ' + employeeForm.firstKana}"></td></tr>
                    <tr><th class="bg-light">パスワード</th><td>●●●●●●●●</td></tr>
                    <tr><th class="bg-light">部署</th><td th:text="${department.deptName}"></td></tr>
                    <tr><th class="bg-light">性別</th><td th:text="${employeeForm.gender == 1 ? '男性' : '女性'}"></td></tr>
                    <tr><th class="bg-light">権限</th><td th:text="${employeeForm.role == 1 ? '管理者' : '一般'}"></td></tr>
                </tbody>
            </table>

            <form th:action="@{/changeEmployee}" th:object="${employeeForm}" method="post">
                <input type="hidden" th:field="*{empNo}">
                <input type="hidden" th:field="*{lastName}">
                <input type="hidden" th:field="*{firstName}">
                <input type="hidden" th:field="*{lastKana}">
                <input type="hidden" th:field="*{firstKana}">
                <input type="hidden" th:field="*{password}">
                <input type="hidden" th:field="*{gender}">
                <input type="hidden" th:field="*{deptNo}">
                <input type="hidden" th:field="*{role}">
                <input type="hidden" th:field="*{deleteFlg}">

                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn btn-primary px-5">変更確定</button>
                    <button type="submit" name="back" th:formaction="@{/changeInput/{id}(id=*{empNo})}" class="btn btn-outline-secondary">修正する</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
