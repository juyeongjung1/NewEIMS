<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>螟画峩遒ｺ隱・- EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">遉ｾ蜩｡諠・ｱ螟画峩縺ｮ遒ｺ隱・/h2>
        <div class="alert alert-info">莉･荳九・蜀・ｮｹ縺ｫ螟画峩縺励∪縺吶ゅｈ繧阪＠縺・〒縺吶°・・/div>
        <div class="bg-white p-4 rounded border mb-4">
            <table class="table table-bordered mb-4">
                <tbody>
                    <tr><th class="w-25 bg-light">遉ｾ蜩｡逡ｪ蜿ｷ</th><td th:text="${employeeForm.empNo}"></td></tr>
                    <tr><th class="bg-light">豌擾ｼ域ｼ｢蟄暦ｼ・/th><td th:text="${employeeForm.lastName}"></td></tr>
                    <tr><th class="bg-light">蜷搾ｼ域ｼ｢蟄暦ｼ・/th><td th:text="${employeeForm.firstName}"></td></tr>
                    <tr><th class="bg-light">豌擾ｼ医き繝奇ｼ・/th><td th:text="${employeeForm.lastKana}"></td></tr>
                    <tr><th class="bg-light">蜷搾ｼ医き繝奇ｼ・/th><td th:text="${employeeForm.firstKana}"></td></tr>
                    <tr><th class="bg-light">繝代せ繝ｯ繝ｼ繝・/th><td>********・磯撼陦ｨ遉ｺ・・/td></tr>
                    <tr><th class="bg-light">諤ｧ蛻･</th><td th:text="${employeeForm.gender == 1 ? '逕ｷ諤ｧ' : '螂ｳ諤ｧ'}"></td></tr>
                    <tr><th class="bg-light">謇螻樣Κ鄂ｲ</th><td th:text="${department.deptName}"></td></tr>
                </tbody>
            </table>
            <div class="d-flex gap-2">
                <form th:action="@{/changeInput/{id}(id=${employeeForm.empNo})}" th:object="${employeeForm}" method="post">
                    <input type="hidden" th:field="*{empNo}">
                    <input type="hidden" th:field="*{lastName}">
                    <input type="hidden" th:field="*{firstName}">
                    <input type="hidden" th:field="*{lastKana}">
                    <input type="hidden" th:field="*{firstKana}">
                    <input type="hidden" th:field="*{password}">
                    <input type="hidden" th:field="*{gender}">
                    <input type="hidden" th:field="*{deptNo}">
                    <button type="submit" class="btn btn-secondary">菫ｮ豁｣縺吶ｋ</button>
                </form>
                <form th:action="@{/changeEmployee}" th:object="${employeeForm}" method="post">
                    <input type="hidden" th:field="*{empNo}">
                    <input type="hidden" th:field="*{lastName}">
                    <input type="hidden" th:field="*{firstName}">
                    <input type="hidden" th:field="*{lastKana}">
                    <input type="hidden" th:field="*{firstKana}">
                    <input type="hidden" th:field="*{password}">
                    <input type="hidden" th:field="*{gender}">
                    <input type="hidden" th:field="*{deptNo}">
                    <button type="submit" class="btn btn-primary">螟画峩遒ｺ螳壹☆繧・/button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
