<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>遉ｾ蜩｡隧ｳ邏ｰ - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">遉ｾ蜩｡隧ｳ邏ｰ</h2>

        <div class="bg-white p-4 rounded border mb-4">
                    <table class="table table-bordered mb-0">
                        <tbody>
                            <tr>
                                <th>遉ｾ蜩｡逡ｪ蜿ｷ</th>
                                <td th:text="${employee.empNo}"></td>
                            </tr>
                            <tr>
                                <th>豌丞錐</th>
                                <td th:text="${employee.lName} + ' ' + ${employee.fName}"></td>
                            </tr>
                            <tr>
                                <th>豌丞錐・医き繝奇ｼ・/th>
                                <td th:text="${employee.lKana} + ' ' + ${employee.fKana}"></td>
                            </tr>
                            <tr>
                                <th>諤ｧ蛻･</th>
                                <td th:text="${employee.gender == 1 ? '逕ｷ諤ｧ' : '螂ｳ諤ｧ'}"></td>
                            </tr>
                            <tr>
                                <th>謇螻樣Κ鄂ｲ</th>
                                <td th:text="${employee.department.deptName}"></td>
                            </tr>
                        </tbody>
                    </table>
        </div>

        <div class="mb-5">
            <div class="mb-3">
                <a th:href="@{/employeeList}" class="btn btn-secondary me-2">荳隕ｧ縺ｫ謌ｻ繧・/a>
                <a th:href="@{/search}" class="btn btn-secondary">讀懃ｴ｢逕ｻ髱｢縺ｫ謌ｻ繧・/a>
            </div>
            <div>
                <a th:href="@{/changeInput/{id}(id=${employee.empNo})}" class="btn btn-warning me-2">諠・ｱ繧貞､画峩縺吶ｋ</a>
                <a th:href="@{/deleteConfirm/{id}(id=${employee.empNo})}" class="btn btn-danger">蜑企勁縺吶ｋ</a>
            </div>
        </div>
    </div>
</body>
</html>
