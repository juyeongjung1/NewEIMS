<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員詳細 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">社員詳細</h2>

        <div class="bg-white p-4 rounded border mb-4">
                    <table class="table table-bordered mb-0">
                        <tbody>
                            <tr>
                                <th>社員番号</th>
                                <td th:text="${employee.empno}"></td>
                            </tr>
                            <tr>
                                <th>氏名</th>
                                <td th:text="${employee.lname} + ' ' + ${employee.fname}"></td>
                            </tr>
                            <tr>
                                <th>氏名（カナ）</th>
                                <td th:text="${employee.lkana} + ' ' + ${employee.fkana}"></td>
                            </tr>
                            <tr>
                                <th>性別</th>
                                <td th:text="${employee.gender == 1 ? '男性' : '女性'}"></td>
                            </tr>
                            <tr>
                                <th>所属部署</th>
                                <td th:text="${employee.department.deptname}"></td>
                            </tr>
                        </tbody>
                    </table>
        </div>

        <div class="mb-5">
            <div class="mb-3">
                <a th:href="@{/employeeList}" class="btn btn-secondary me-2">一覧に戻る</a>
                <a th:href="@{/search}" class="btn btn-secondary">検索画面に戻る</a>
            </div>
            <div>
                <a th:href="@{/changeInput/{id}(id=${employee.empno})}" class="btn btn-warning me-2">情報を変更する</a>
                <a th:href="@{/deleteConfirm/{id}(id=${employee.empno})}" class="btn btn-danger">削除する</a>
            </div>
        </div>
    </div>
</body>
</html>
