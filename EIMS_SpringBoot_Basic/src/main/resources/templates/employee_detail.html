<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員詳細 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">社員詳細情報</h2>
        <div class="bg-white p-4 rounded border mb-4 shadow-sm">
            <table class="table table-bordered mb-4">
                <tbody>
                    <tr><th class="w-25 bg-light">社員番号</th><td th:text="${employee.empNo}"></td></tr>
                    <tr><th class="bg-light">姓名</th><td th:text="${employee.lastName} + ' ' + ${employee.firstName}"></td></tr>
                    <tr><th class="bg-light">姓名 (カナ)</th><td th:text="${employee.lastKana} + ' ' + ${employee.firstKana}"></td></tr>
                    <tr><th class="bg-light">性別</th><td th:text="${employee.gender == 1 ? '男性' : '女性'}"></td></tr>
                    <tr><th class="bg-light">所属部署</th><td th:text="${employee.department.deptName}"></td></tr>
                </tbody>
            </table>
            <div class="d-flex gap-2">
                <a th:href="@{/changeInput/{id}(id=${employee.empNo})}" class="btn btn-warning">情報を変更する</a>
                <a th:href="@{/deleteConfirm/{id}(id=${employee.empNo})}" class="btn btn-danger">削除する</a>
            </div>
        </div>
        <div class="mb-5">
            <a th:href="@{/employeeList}" class="btn btn-secondary me-2">一覧に戻る</a>
            <a th:href="@{/search}" class="btn btn-secondary me-2">検索に戻る</a>
            <a th:href="@{/}" class="btn btn-secondary">トップに戻る</a>
        </div>
    </div>
</body>
</html>
