<!-- change.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員情報変更 - EIMS</title>
</head>
<body>
    <nav>
        <div>
            <a th:href="@{/}">EIMS</a>
        </div>
    </nav>
    <div>
        <div>
            <div>
                <h2>社員情報変更</h2>
                <div>
                    <div>
                        <form th:action="@{/changeConfirm}" th:object="${employeeForm}" method="post">
                            <!-- 社員番号は変更不可だが、送信のために hidden で持つ -->
                            <div>
                                <label>社員番号</label>
                                <div th:text="*{empno}"></div>
                                <input type="hidden" th:field="*{empno}">
                            </div>

                            <div>
                                <div>
                                    <label>氏</label>
                                    <input type="text" th:field="*{lname}">
                                    <div th:errors="*{lname}"></div>
                                </div>
                                <div>
                                    <label>名</label>
                                    <input type="text" th:field="*{fname}">
                                    <div th:errors="*{fname}"></div>
                                </div>
                            </div>
                            <div>
                                <div>
                                    <label>氏（カナ）</label>
                                    <input type="text" th:field="*{lkana}">
                                    <div th:errors="*{lkana}"></div>
                                </div>
                                <div>
                                    <label>名（カナ）</label>
                                    <input type="text" th:field="*{fkana}">
                                    <div th:errors="*{fkana}"></div>
                                </div>
                            </div>
                            <div>
                                <label>パスワード</label>
                                <input type="password" th:field="*{password}">
                                <div th:errors="*{password}"></div>
                            </div>
                            <div>
                                <label>性別</label>
                                <div>
                                    <input type="radio" th:field="*{gender}" value="1" id="m">
                                    <label for="m">男性</label>
                                </div>
                                <div>
                                    <input type="radio" th:field="*{gender}" value="2" id="f">
                                    <label for="f">女性</label>
                                </div>
                            </div>
                            <div>
                                <label>所属部署</label>
                                <select th:field="*{deptno}">
                                    <option th:each="dept : ${departments}" th:value="${dept.deptno}" th:text="${dept.deptname}"></option>
                                </select>
                            </div>
                            <div>
                                <a th:href="@{/detail/{id}(id=*{empno})}">詳細に戻る</a>
                                <button type="submit">確認画面へ</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
