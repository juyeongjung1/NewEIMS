<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員情報変更 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">社員情報変更</h2>
        <div class="bg-white p-4 rounded border mb-4">
            <form th:action="@{/changeConfirm}" th:object="${employeeForm}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">社員番号</label>
                    <div class="form-control bg-light w-50" th:text="*{empNo}"></div>
                    <input type="hidden" th:field="*{empNo}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">氏（漢字）</label>
                    <input type="text" th:field="*{lastName}" class="form-control w-50" placeholder="氏" required>
                    <div th:errors="*{lastName}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">名（漢字）</label>
                    <input type="text" th:field="*{firstName}" class="form-control w-50" placeholder="名" required>
                    <div th:errors="*{firstName}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">氏（カナ）</label>
                    <input type="text" th:field="*{lastKana}" class="form-control w-50" placeholder="セイ" required>
                    <div th:errors="*{lastKana}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">名（カナ）</label>
                    <input type="text" th:field="*{firstKana}" class="form-control w-50" placeholder="メイ" required>
                    <div th:errors="*{firstKana}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">パスワード</label>
                    <input type="password" th:field="*{password}" class="form-control w-50" required>
                    <div th:errors="*{password}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold d-block">性別</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" th:field="*{gender}" value="1" id="genderM" required>
                        <label class="form-check-label" for="genderM">男性</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" th:field="*{gender}" value="2" id="genderF" required>
                        <label class="form-check-label" for="genderF">女性</label>
                    </div>
                    <div th:errors="*{gender}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">所属部署</label>
                    <select th:field="*{deptNo}" class="form-select w-50" required>
                        <option th:each="dept : ${departments}" th:value="${dept.deptNo}" th:text="${dept.deptName}"></option>
                    </select>
                    <div th:errors="*{deptNo}" class="text-danger mt-1"></div>
                </div>
                <div>
                    <a th:href="@{/detail/{id}(id=*{empNo})}" class="btn btn-secondary me-2">詳細に戻る</a>
                    <button type="submit" class="btn btn-primary">確認画面へ</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
