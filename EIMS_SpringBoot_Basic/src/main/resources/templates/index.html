<!-- index.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIMS Web - トップ</title>
</head>
<body>
    <nav>
        <div>
            <a th:href="@{/}">EIMS 社員情報管理システム</a>
        </div>
    </nav>

    <div>
        <div>
            <div>
                <div>
                    <div>
                        <h4>メインメニュー</h4>
                    </div>
                    <div>
                        <div>
                            <a th:href="@{/employeeList}">
                                <div>
                                    <h5>社員一覧</h5>
                                    <p>登録されているすべての社員を表示します</p>
                                </div>
                                <span>→</span>
                            </a>
                            <a th:href="@{/search}">
                                <div>
                                    <h5>社員検索</h5>
                                    <p>番号、氏名、部署から社員を検索します</p>
                                </div>
                                <span>→</span>
                            </a>
                            <a th:href="@{/input}">
                                <div>
                                    <h5>新規登録</h5>
                                    <p>新しい社員の情報を登録します</p>
                                </div>
                                <span>＋</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
