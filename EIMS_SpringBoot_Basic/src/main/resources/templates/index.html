<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EIMS - トップページ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-primary mb-4 fw-bold">EIMS 社員情報管理システム</h1>
        
        <div class="bg-white p-4 rounded border">
            <h2 class="fs-5 mb-4 border-bottom pb-2">メインメニュー</h2>
            
            <div class="mb-4">
                <a th:href="@{/employeeList}" class="btn btn-primary">社員一覧</a>
                <p class="text-secondary mt-1">登録されているすべての社員を表示します</p>
            </div>
            
            <div class="mb-4">
                <a th:href="@{/search}" class="btn btn-primary">社員検索</a>
                <p class="text-secondary mt-1">番号、氏名、部署から社員を検索します</p>
            </div>
            
            <div class="mb-4">
                <a th:href="@{/input}" class="btn btn-primary">新規登録</a>
                <p class="text-secondary mt-1">新しい社員の情報を登録します</p>
            </div>
        </div>
    </div>
</body>
</html>
