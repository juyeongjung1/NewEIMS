<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員情報管理システム - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">メニュー</h2>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">社員一覧</h5>
                        <p class="card-text text-muted">全社員の情報をリスト形式で表示します。</p>
                        <a th:href="@{/employeeList}" class="btn btn-outline-primary stretched-link">一覧を表示</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">社員検索</h5>
                        <p class="card-text text-muted">条件を指定して社員を検索します。</p>
                        <a th:href="@{/search}" class="btn btn-outline-primary stretched-link">検索画面へ</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">新規登録</h5>
                        <p class="card-text text-muted">新しい社員をシステムに登録します。</p>
                        <a th:href="@{/input}" class="btn btn-outline-primary stretched-link">登録画面へ</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
