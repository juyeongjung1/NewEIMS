<!-- index.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIMS Web - トップ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">EIMS 社員情報管理システム</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white py-3">
                        <h4 class="mb-0 text-primary">メインメニュー</h4>
                    </div>
                    <div class="card-body p-4">
                        <div class="list-group list-group-flush">
                            <a th:href="@{/employeeList}" class="list-group-item list-group-item-action py-3 d-flex justify-content-between align-items-center">
                                <div>
                                    <h5 class="mb-1">社員一覧</h5>
                                    <p class="text-muted small mb-0">登録されているすべての社員を表示します</p>
                                </div>
                                <span class="badge bg-primary rounded-pill">→</span>
                            </a>
                            <a th:href="@{/search}" class="list-group-item list-group-item-action py-3 d-flex justify-content-between align-items-center">
                                <div>
                                    <h5 class="mb-1">社員検索</h5>
                                    <p class="text-muted small mb-0">番号、氏名、部署から社員を検索します</p>
                                </div>
                                <span class="badge bg-primary rounded-pill">→</span>
                            </a>
                            <a th:href="@{/input}" class="list-group-item list-group-item-action py-3 d-flex justify-content-between align-items-center">
                                <div>
                                    <h5 class="mb-1">新規登録</h5>
                                    <p class="text-muted small mb-0">新しい社員の情報を登録します</p>
                                </div>
                                <span class="badge bg-success rounded-pill">＋</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
