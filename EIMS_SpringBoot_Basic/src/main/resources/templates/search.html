<!-- search.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員検索 - EIMS</title>
</head>
<body>
    <nav>
        <div>
            <a th:href="@{/}">EIMS</a>
        </div>
    </nav>
    <div>
        <h2>社員検索</h2>
        
        <div>
            <!-- 社員番号で検索 -->
            <div>
                <div>
                    <div>
                        <h5>社員番号で検索</h5>
                        <form th:action="@{/selectByEmpNo}" method="get">
                            <div>
                                <input type="number" name="empno" placeholder="社員番号を入力" required>
                            </div>
                            <button type="submit">検索</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 名字で検索 -->
            <div>
                <div>
                    <div>
                        <h5>名字で検索</h5>
                        <form th:action="@{/selectByEmpName}" method="get">
                            <div>
                                <input type="text" name="keyword" placeholder="名字を入力（部分一致）" required>
                            </div>
                            <button type="submit">検索</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 部署で検索 -->
            <div>
                <div>
                    <div>
                        <h5>部署で検索</h5>
                        <form th:action="@{/selectByDeptNo}" method="get">
                            <div>
                                <select name="deptno" required>
                                    <option value="">部署を選択してください</option>
                                    <option th:each="dept : ${departments}" th:value="${dept.deptno}" th:text="${dept.deptname}"></option>
                                </select>
                            </div>
                            <button type="submit">検索</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <div>
            <a th:href="@{/}">メニューに戻る</a>
        </div>
    </div>
</body>
</html>
