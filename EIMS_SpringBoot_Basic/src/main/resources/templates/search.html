<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員検索 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">社員検索</h2>
        
        <div class="bg-white p-4 rounded border mb-4">
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="p-3 bg-light rounded border">
                        <h5 class="mb-3 text-secondary">社員番号で検索</h5>
                        <form th:action="@{/selectByEmpNo}" method="get">
                            <div class="mb-3">
                                <input type="number" name="empno" class="form-control" placeholder="社員番号を入力" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">検索</button>
                        </form>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="p-3 bg-light rounded border">
                        <h5 class="mb-3 text-secondary">名字で検索</h5>
                        <form th:action="@{/selectByEmpName}" method="get">
                            <div class="mb-3">
                                <input type="text" name="keyword" class="form-control" placeholder="名字を入力（部分一致）" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">検索</button>
                        </form>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="p-3 bg-light rounded border">
                        <h5 class="mb-3 text-secondary">部署で検索</h5>
                        <form th:action="@{/selectByDeptNo}" method="get">
                            <div class="mb-3">
                                <select name="deptno" class="form-control" required>
                                    <option value="">部署を選択してください</option>
                                    <option th:each="dept : ${departments}" th:value="${dept.deptno}" th:text="${dept.deptname}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">検索</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mb-5">
            <a th:href="@{/}" class="btn btn-secondary">メニューに戻る</a>
        </div>
    </div>
</body>
</html>
