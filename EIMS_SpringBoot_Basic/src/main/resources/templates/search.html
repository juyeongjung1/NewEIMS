<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員検索 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">社員検索</h2>
        
        <div class="row g-4">
            <!-- 社員番号で検索 -->
            <div class="col-md-4">
                <div class="card h-100 border-primary">
                    <div class="card-header bg-primary text-white">社員番号で検索</div>
                    <div class="card-body">
                        <form th:action="@{/selectByEmpNo}" method="get">
                            <div class="mb-3">
                                <label class="form-label">社員番号</label>
                                <input type="number" name="empNo" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">検索</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 社員名で検索 -->
            <div class="col-md-4">
                <div class="card h-100 border-primary">
                    <div class="card-header bg-primary text-white">社員名で検索</div>
                    <div class="card-body">
                        <form th:action="@{/selectByEmpName}" method="get">
                            <div class="mb-3">
                                <label class="form-label">名前（氏または名）</label>
                                <input type="text" name="keyword" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">検索</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 部署で検索 -->
            <div class="col-md-4">
                <div class="card h-100 border-primary">
                    <div class="card-header bg-primary text-white">部署で検索</div>
                    <div class="card-body">
                        <form th:action="@{/selectByDeptNo}" method="get">
                            <div class="mb-3">
                                <label class="form-label">部署</label>
                                <select name="deptNo" class="form-select" required>
                                    <option value="">選択してください</option>
                                    <option th:each="dept : ${departments}" th:value="${dept.deptNo}" th:text="${dept.deptName}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">検索</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5 mb-5">
            <a th:href="@{/}" class="btn btn-secondary">トップページへ戻る</a>
        </div>
    </div>
</body>
</html>
