<!-- search.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員検索 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="mb-4">社員検索</h2>
        
        <div class="row g-4">
            <!-- 社員番号で検索 -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">社員番号で検索</h5>
                        <form th:action="@{/selectByEmpNo}" method="get">
                            <div class="mb-3">
                                <input type="number" name="empno" class="form-control" placeholder="社員番号を入力" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">検索</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 名字で検索 -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">名字で検索</h5>
                        <form th:action="@{/selectByEmpName}" method="get">
                            <div class="mb-3">
                                <input type="text" name="keyword" class="form-control" placeholder="名字を入力（部分一致）" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">検索</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 部署で検索 -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">部署で検索</h5>
                        <form th:action="@{/selectByDeptNo}" method="get">
                            <div class="mb-3">
                                <select name="deptno" class="form-select" required>
                                    <option value="">部署を選択してください</option>
                                    <option th:each="dept : ${departments}" th:value="${dept.deptno}" th:text="${dept.deptname}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">検索</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <a th:href="@{/}" class="btn btn-outline-secondary">メニューに戻る</a>
        </div>
    </div>
</body>
</html>
