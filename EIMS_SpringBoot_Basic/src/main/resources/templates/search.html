<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員検索 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">社員検索</h2>
        
        <div class="mb-4 p-4 bg-white rounded border">
            <h5 class="mb-3 text-secondary">社員番号で検索</h5>
            <form th:action="@{/selectByEmpNo}" method="get" class="mb-4">
                <div class="mb-2">
                    <input type="number" name="empNo" class="form-control w-50" placeholder="社員番号を入力" required>
                </div>
                <button type="submit" class="btn btn-primary">検索</button>
            </form>

            <h5 class="mb-3 text-secondary border-top pt-4">社員名で検索</h5>
            <form th:action="@{/selectByEmpName}" method="get" class="mb-4">
                <div class="mb-2">
                    <input type="text" name="keyword" class="form-control w-50" placeholder="名前を入力（部分一致）" required>
                </div>
                <button type="submit" class="btn btn-primary">検索</button>
            </form>

            <h5 class="mb-3 text-secondary border-top pt-4">部署で検索</h5>
            <form th:action="@{/selectByDeptNo}" method="get">
                <div class="mb-2">
                    <select name="deptNo" class="form-control w-50" required>
                        <option value="">部署を選択してください</option>
                        <option th:each="dept : ${departments}" th:value="${dept.deptNo}" th:text="${dept.deptName}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">検索</button>
            </form>
        </div>
        
        <div class="mb-5">
            <a th:href="@{/}" class="btn btn-secondary">メニューに戻る</a>
        </div>
    </div>
</body>
</html>
