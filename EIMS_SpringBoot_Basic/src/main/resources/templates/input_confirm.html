<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登録確認 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">社員情報登録の確認</h2>
        <div class="alert alert-info">以下の内容で登録します。よろしいですか？</div>
        <div class="bg-white p-4 rounded border mb-4 shadow-sm">
            <table class="table table-bordered mb-4">
                <tbody>
                    <tr><th class="w-25 bg-light">姓名</th><td th:text="${employeeForm.lastName} + ' ' + ${employeeForm.firstName}"></td></tr>
                    <tr><th class="bg-light">姓名 (カナ)</th><td th:text="${employeeForm.lastKana} + ' ' + ${employeeForm.firstKana}"></td></tr>
                    <tr><th class="bg-light">パスワード</th><td>******** (非表示)</td></tr>
                    <tr><th class="bg-light">性別</th><td th:text="${employeeForm.gender == 1 ? '男性' : '女性'}"></td></tr>
                    <tr><th class="bg-light">所属部署</th><td th:text="${department.deptName}"></td></tr>
                </tbody>
            </table>
            <div class="d-flex gap-2">
                <form th:action="@{/input}" th:object="${employeeForm}" method="post">
                    <input type="hidden" th:field="*{lastName}">
                    <input type="hidden" th:field="*{firstName}">
                    <input type="hidden" th:field="*{lastKana}">
                    <input type="hidden" th:field="*{firstKana}">
                    <input type="hidden" th:field="*{password}">
                    <input type="hidden" th:field="*{gender}">
                    <input type="hidden" th:field="*{deptNo}">
                    <button type="submit" class="btn btn-secondary">修正する</button>
                </form>
                <form th:action="@{/saveEmployee}" th:object="${employeeForm}" method="post">
                    <input type="hidden" th:field="*{lastName}">
                    <input type="hidden" th:field="*{firstName}">
                    <input type="hidden" th:field="*{lastKana}">
                    <input type="hidden" th:field="*{firstKana}">
                    <input type="hidden" th:field="*{password}">
                    <input type="hidden" th:field="*{gender}">
                    <input type="hidden" th:field="*{deptNo}">
                    <button type="submit" class="btn btn-primary">登録確定</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
