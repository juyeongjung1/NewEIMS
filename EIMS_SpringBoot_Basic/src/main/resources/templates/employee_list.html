<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員一覧 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <div class="row mb-4">
            <div class="col-8">
                <h2 class="text-primary">社員一覧</h2>
            </div>
            <div class="col-4 text-end">
                <a th:href="@{/input}" class="btn btn-primary">新規登録</a>
            </div>
        </div>

        <div class="bg-white p-4 rounded border mb-4">
            <div class="table-responsive">
                <table class="table table-hover table-bordered mb-0">
                    <thead class="table-info">
                        <tr>
                            <th>社員番号</th>
                            <th>氏名 (カナ)</th>
                            <th>性別</th>
                            <th>部署名</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="emp : ">
                            <td th:text=""></td>
                            <td>
                                <a th:href="@{/detail/{id}(id=)}" class="text-decoration-none"
                                   th:text=" + ' ' +  + ' (' +  + ' ' +  + ')'"></a>
                            </td>
                            <td th:text=""></td>
                            <td th:text=""></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mb-5">
            <a th:href="@{/}" class="btn btn-secondary">メニューに戻る</a>
        </div>
    </div>
</body>
</html>
