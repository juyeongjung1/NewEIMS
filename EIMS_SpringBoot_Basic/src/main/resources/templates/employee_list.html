<!-- employee_list.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員一覧 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>社員一覧</h2>
            <a th:href="@{/input}" class="btn btn-success">新規登録</a>
        </div>

        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>社員番号</th>
                            <th>氏名</th>
                            <th>カナ</th>
                            <th>性別</th>
                            <th>部署名</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="emp : ${employees}">
                            <td th:text="${emp.empno}"></td>
                            <td>
                                <a th:href="@{/detail/{id}(id=${emp.empno})}" 
                                   th:text="${emp.lname} + ' ' + ${emp.fname}"
                                   class="text-decoration-none fw-bold"></a>
                            </td>
                            <td th:text="${emp.lkana} + ' ' + ${emp.fkana}"></td>
                            <td th:text="${emp.gender == 1 ? '男性' : '女性'}"></td>
                            <td th:text="${emp.department.deptname}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-4">
            <a th:href="@{/}" class="btn btn-outline-secondary">メニューに戻る</a>
        </div>
    </div>
</body>
</html>
