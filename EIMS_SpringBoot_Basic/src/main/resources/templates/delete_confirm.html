<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>蜑企勁遒ｺ隱・- EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">遉ｾ蜩｡蜑企勁縺ｮ遒ｺ隱・/h2>
        <div class="alert alert-danger">莉･荳九・遉ｾ蜩｡繧呈悽蠖薙↓蜑企勁縺励∪縺吶°・・/div>
        <div class="bg-white p-4 rounded border mb-4">
            <table class="table table-bordered mb-4">
                <tbody>
                    <tr><th>遉ｾ蜩｡逡ｪ蜿ｷ</th><td th:text="${employee.empNo}"></td></tr>
                    <tr><th>豌丞錐</th><td th:text="${employee.lastName} + ' ' + ${employee.firstName}"></td></tr>
                    <tr><th>謇螻樣Κ鄂ｲ</th><td th:text="${employee.department.deptName}"></td></tr>
                </tbody>
            </table>
            <div class="d-flex gap-2">
                <a th:href="@{/detail/{id}(id=${employee.empNo})}" class="btn btn-secondary">隧ｳ邏ｰ縺ｫ謌ｻ繧・/a>
                <form th:action="@{/deleteEmployee}" method="post">
                    <input type="hidden" name="empNo" th:value="${employee.empNo}">
                    <button type="submit" class="btn btn-danger">蜑企勁螳溯｡後☆繧・/button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
