<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>削除確認 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-danger mb-4">社員情報の削除確認</h2>
        <div class="alert alert-danger">この社員情報を削除します。この操作は取り消せません。よろしいですか？</div>
        <div class="bg-white p-4 rounded border mb-4 shadow-sm">
            <table class="table table-bordered mb-4">
                <tbody>
                    <tr><th class="w-25 bg-light">社員番号</th><td th:text="${employee.empNo}"></td></tr>
                    <tr><th class="bg-light">姓名</th><td th:text="${employee.lastName} + ' ' + ${employee.firstName}"></td></tr>
                    <tr><th class="bg-light">所属部署</th><td th:text="${employee.department.deptName}"></td></tr>
                </tbody>
            </table>
            <form th:action="@{/deleteEmployee}" method="post">
                <input type="hidden" name="empNo" th:value="${employee.empNo}">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">削除を確定する</button>
                    <a th:href="@{/detail/{id}(id=${employee.empNo})}" class="btn btn-secondary">キャンセル</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
