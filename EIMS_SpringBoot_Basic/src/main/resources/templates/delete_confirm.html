<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>削除確認 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">社員削除の確認</h2>
        <div class="alert alert-danger">以下の社員を本当に削除しますか？</div>
        <div class="bg-white p-4 rounded border mb-4">
            <table class="table table-bordered mb-4">
                <tbody>
                    <tr><th>社員番号</th><td th:text="${employee.empno}"></td></tr>
                    <tr><th>氏名</th><td th:text="${employee.lname} + ' ' + ${employee.fname}"></td></tr>
                    <tr><th>所属部署</th><td th:text="${employee.department.deptname}"></td></tr>
                </tbody>
            </table>
            <div class="d-flex gap-2">
                <a th:href="@{/detail/{id}(id=${employee.empno})}" class="btn btn-secondary">詳細に戻る</a>
                <form th:action="@{/deleteEmployee}" method="post">
                    <input type="hidden" name="empno" th:value="${employee.empno}">
                    <button type="submit" class="btn btn-danger">削除実行する</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
