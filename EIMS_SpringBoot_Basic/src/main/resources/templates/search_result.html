<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>検索結果一覧 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">検索結果一覧</h2>

        <div th:if="${employees.size() == 0}" class="bg-white p-4 rounded border mb-4">
            <p class="text-danger m-0">該当する社員は存在しませんでした。</p>
        </div>

        <div th:if="${employees.size() > 0}" class="bg-white p-4 rounded border mb-4">
            <div class="table-responsive">
                <table class="table table-hover table-bordered mb-0">
                    <thead>
                        <tr>
                            <th>社員番号</th>
                            <th>氏名 (カナ)</th>
                            <th>性別</th>
                            <th>部署名</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="emp : ${employees}">
                            <td th:text="${emp.empno}"></td>
                            <td>
                                <a th:href="@{/detail/{id}(id=${emp.empno})}" class="text-decoration-none"
                                   th:text="${emp.lname} + ' ' + ${emp.fname} + ' (' + ${emp.lkana} + ' ' + ${emp.fkana} + ')'"></a>
                            </td>
                            <td th:text="${emp.gender == 1 ? '男性' : '女性'}"></td>
                            <td th:text="${emp.department.deptname}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mb-5">
            <a th:href="@{/search}" class="btn btn-secondary me-2">検索画面に戻る</a>
            <a th:href="@{/}" class="btn btn-secondary">メニューに戻る</a>
        </div>
    </div>
</body>
</html>
