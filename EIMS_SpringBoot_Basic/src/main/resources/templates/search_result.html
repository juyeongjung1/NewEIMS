<!-- search_result.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>検索結果 - EIMS</title>
</head>
<body>
    <nav>
        <div>
            <a th:href="@{/}">EIMS</a>
        </div>
    </nav>
    <div>
        <h2>検索結果一覧</h2>

        <!-- 検索結果が 0 件の場合のメッセージ表示 -->
        <div th:if="${#lists.isEmpty(employees)}" role="alert">
            <i></i>
            該当する社員は存在しませんでした。
        </div>

        <!-- 検索結果が存在する場合のみテーブルを表示 -->
        <div th:unless="${#lists.isEmpty(employees)}">
            <div>
                <table>
                    <thead>
                        <tr>
                            <th>社員番号</th>
                            <th>氏名 (カナ)</th>
                            <th>性別</th>
                            <th>部署名</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="emp : ${employees}">
                            <td th:text="${emp.empno}"></td>
                            <td>
                                <a th:href="@{/detail/{id}(id=${emp.empno})}" 
                                   th:text="${emp.lname} + ' ' + ${emp.fname} + ' (' + ${emp.lkana} + ' ' + ${emp.fkana} + ')'"></a>
                            </td>
                            <td th:text="${emp.gender == 1 ? '男性' : '女性'}"></td>
                            <td th:text="${emp.department.deptname}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div>
            <a th:href="@{/search}">検索に戻る</a>
        </div>
    </div>
</body>
</html>
