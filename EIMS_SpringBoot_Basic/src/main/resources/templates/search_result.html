<!-- search_result.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>検索結果 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="mb-4">検索結果</h2>

        <!-- 0件制御 -->
        <div th:if="${#lists.isEmpty(employees)}" class="alert alert-info shadow-sm" role="alert">
            該当する社員は存在しません。
        </div>

        <div th:if="${!#lists.isEmpty(employees)}" class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>社員番号</th>
                            <th>氏名</th>
                            <th>部署</th>
                            <th class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="emp : ${employees}">
                            <td th:text="${emp.empno}"></td>
                            <td th:text="${emp.lname} + ' ' + ${emp.fname}"></td>
                            <td th:text="${emp.department.deptname}"></td>
                            <td class="text-center">
                                <a th:href="@{/detail/{id}(id=${emp.empno})}" class="btn btn-sm btn-outline-primary">詳細</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-4">
            <a th:href="@{/search}" class="btn btn-outline-secondary">検索に戻る</a>
        </div>
    </div>
</body>
</html>
