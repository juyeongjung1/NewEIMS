<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>遉ｾ蜩｡諠・ｱ逋ｻ骭ｲ - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">遉ｾ蜩｡諠・ｱ逋ｻ骭ｲ</h2>
        <div class="bg-white p-4 rounded border mb-4">
            <form th:action="@{/inputConfirm}" th:object="${employeeForm}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-bold">豌丞錐</label>
                    <div class="d-flex gap-2">
                        <input type="text" th:field="*{lastName}" class="form-control" placeholder="蟋・ required>
                        <input type="text" th:field="*{firstName}" class="form-control" placeholder="蜷・ required>
                    </div>
                    <div th:errors="*{lastName}" class="text-danger mt-1"></div>
                    <div th:errors="*{firstName}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">豌丞錐・医き繝奇ｼ・/label>
                    <div class="d-flex gap-2">
                        <input type="text" th:field="*{lastKana}" class="form-control" placeholder="繧ｻ繧､" required>
                        <input type="text" th:field="*{firstKana}" class="form-control" placeholder="繝｡繧､" required>
                    </div>
                    <div th:errors="*{lastKana}" class="text-danger mt-1"></div>
                    <div th:errors="*{firstKana}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">繝代せ繝ｯ繝ｼ繝・/label>
                    <input type="password" th:field="*{password}" class="form-control w-50" required>
                    <div th:errors="*{password}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold d-block">諤ｧ蛻･</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" th:field="*{gender}" value="1" id="genderM" required>
                        <label class="form-check-label" for="genderM">逕ｷ諤ｧ</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" th:field="*{gender}" value="2" id="genderF" required>
                        <label class="form-check-label" for="genderF">螂ｳ諤ｧ</label>
                    </div>
                    <div th:errors="*{gender}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">謇螻樣Κ鄂ｲ</label>
                    <select th:field="*{deptNo}" class="form-select w-50" required>
                        <option th:each="dept : ${departments}" th:value="${dept.deptNo}" th:text="${dept.deptName}"></option>
                    </select>
                    <div th:errors="*{deptNo}" class="text-danger mt-1"></div>
                </div>
                <div>
                    <a th:href="@{/}" class="btn btn-secondary me-2">繝｡繝九Η繝ｼ縺ｫ謌ｻ繧・/a>
                    <button type="submit" class="btn btn-primary">遒ｺ隱咲判髱｢縺ｸ</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
