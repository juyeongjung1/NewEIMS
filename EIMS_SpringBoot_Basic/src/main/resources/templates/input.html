<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員情報登録 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">社員情報登録</h2>
        <div class="bg-white p-4 rounded border mb-4">
            <form th:action="@{/inputConfirm}" th:object="${employeeForm}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">社員番号</label>
                    <input type="number" th:field="*{empno}" class="form-control w-50" required>
                    <div th:errors="*{empno}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">氏名</label>
                    <div class="d-flex gap-2">
                        <input type="text" th:field="*{lname}" class="form-control" placeholder="姓" required>
                        <input type="text" th:field="*{fname}" class="form-control" placeholder="名" required>
                    </div>
                    <div th:errors="*{lname}" class="text-danger mt-1"></div>
                    <div th:errors="*{fname}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">氏名（カナ）</label>
                    <div class="d-flex gap-2">
                        <input type="text" th:field="*{lkana}" class="form-control" placeholder="セイ" required>
                        <input type="text" th:field="*{fkana}" class="form-control" placeholder="メイ" required>
                    </div>
                    <div th:errors="*{lkana}" class="text-danger mt-1"></div>
                    <div th:errors="*{fkana}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">パスワード</label>
                    <input type="password" th:field="*{password}" class="form-control w-50" required>
                    <div th:errors="*{password}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold d-block">性別</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" th:field="*{gender}" value="1" id="genderM" required>
                        <label class="form-check-label" for="genderM">男性</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" th:field="*{gender}" value="2" id="genderF" required>
                        <label class="form-check-label" for="genderF">女性</label>
                    </div>
                    <div th:errors="*{gender}" class="text-danger mt-1"></div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">所属部署</label>
                    <select th:field="*{deptno}" class="form-select w-50" required>
                        <option th:each="dept : ${departments}" th:value="${dept.deptno}" th:text="${dept.deptname}"></option>
                    </select>
                    <div th:errors="*{deptno}" class="text-danger mt-1"></div>
                </div>
                <div>
                    <a th:href="@{/}" class="btn btn-secondary me-2">メニューに戻る</a>
                    <button type="submit" class="btn btn-primary">確認画面へ</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
