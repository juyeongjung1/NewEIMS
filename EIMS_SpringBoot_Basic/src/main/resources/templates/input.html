<!-- input.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員登録 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.err { color: #dc3545; font-size: 0.875em; margin-top: 0.25rem; }</style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">EIMS</a>
        </div>
    </nav>
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="mb-4">社員情報登録</h2>
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <form th:action="@{/inputConfirm}" th:object="${employeeForm}" method="post">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">氏</label>
                                    <input type="text" th:field="*{lname}" class="form-control" th:errorclass="is-invalid">
                                    <div class="invalid-feedback" th:errors="*{lname}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">名</label>
                                    <input type="text" th:field="*{fname}" class="form-control" th:errorclass="is-invalid">
                                    <div class="invalid-feedback" th:errors="*{fname}"></div>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">氏（カナ）</label>
                                    <input type="text" th:field="*{lkana}" class="form-control" th:errorclass="is-invalid">
                                    <div class="invalid-feedback" th:errors="*{lkana}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">名（カナ）</label>
                                    <input type="text" th:field="*{fkana}" class="form-control" th:errorclass="is-invalid">
                                    <div class="invalid-feedback" th:errors="*{fkana}"></div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">パスワード</label>
                                <input type="password" th:field="*{password}" class="form-control" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:errors="*{password}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label d-block">性別</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" th:field="*{gender}" value="1" id="m">
                                    <label class="form-check-label" for="m">男性</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" th:field="*{gender}" value="2" id="f">
                                    <label class="form-check-label" for="f">女性</label>
                                </div>
                                <div class="err" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">所属部署</label>
                                <select th:field="*{deptno}" class="form-select">
                                    <option th:each="dept : ${departments}" th:value="${dept.deptno}" th:text="${dept.deptname}"></option>
                                </select>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/}" class="btn btn-outline-secondary">キャンセル</a>
                                <button type="submit" class="btn btn-primary px-5">確認画面へ</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
