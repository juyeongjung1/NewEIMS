<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>変更確認 - EIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="bg-primary p-2 mb-4">
        <div class="container">
            <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-5">EIMS</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-primary mb-4">変更内容の確認</h2>
        <div class="alert alert-info">以下の内容で更新します。よろしいですか？</div>
        <div class="bg-white p-4 rounded border mb-4">
            <table class="table table-bordered mb-4">
                <tbody>
                    <tr><th>社員番号</th><td th:text="${employeeForm.empno}"></td></tr>
                    <tr><th>氏名</th><td th:text="${employeeForm.lname} + ' ' + ${employeeForm.fname}"></td></tr>
                    <tr><th>氏名（カナ）</th><td th:text="${employeeForm.lkana} + ' ' + ${employeeForm.fkana}"></td></tr>
                    <tr><th>パスワード</th><td>********（非表示）</td></tr>
                    <tr><th>性別</th><td th:text="${employeeForm.gender == 1 ? '男性' : '女性'}"></td></tr>
                    <tr><th>所属部署</th><td th:text="${department.deptname}"></td></tr>
                </tbody>
            </table>
            <div class="d-flex gap-2">
                <form th:action="@{/changeInput/{id}(id=${employeeForm.empno})}" th:object="${employeeForm}" method="post">
                    <input type="hidden" th:field="*{empno}">
                    <input type="hidden" th:field="*{lname}">
                    <input type="hidden" th:field="*{fname}">
                    <input type="hidden" th:field="*{lkana}">
                    <input type="hidden" th:field="*{fkana}">
                    <input type="hidden" th:field="*{password}">
                    <input type="hidden" th:field="*{gender}">
                    <input type="hidden" th:field="*{deptno}">
                    <button type="submit" class="btn btn-secondary">修正する</button>
                </form>
                <form th:action="@{/changeEmployee}" th:object="${employeeForm}" method="post">
                    <input type="hidden" th:field="*{empno}">
                    <input type="hidden" th:field="*{lname}">
                    <input type="hidden" th:field="*{fname}">
                    <input type="hidden" th:field="*{lkana}">
                    <input type="hidden" th:field="*{fkana}">
                    <input type="hidden" th:field="*{password}">
                    <input type="hidden" th:field="*{gender}">
                    <input type="hidden" th:field="*{deptno}">
                    <button type="submit" class="btn btn-primary">更新確定する</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
